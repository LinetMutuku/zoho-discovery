<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoho Product Discovery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --navy:#0A2342;--navy2:#04122B;--teal:#028090;--mint:#02C39A;
  --red:#e53935;--red-bg:#fdecea;--red-border:#f5c6c4;
  --white:#fff;--offwhite:#F4F8F9;--muted:#5A7A88;--mid:#B0CDD4;
  --text:#1A2F3C;--border:#D1E4EA;--light:#E0F4F7;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--offwhite);color:var(--text);overflow:hidden}
#shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
#topbar{background:var(--navy2);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;flex-shrink:0;border-bottom:3px solid var(--mint)}
.tb-brand{display:flex;align-items:center;gap:9px;min-width:0}
.tb-dot{width:26px;height:26px;background:var(--mint);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-dot svg{width:13px;height:13px}
.tb-name{font-size:13px;font-weight:600;white-space:nowrap}.tb-name span{color:var(--mint)}
.tb-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-sel{font-size:11px;color:var(--mid);white-space:nowrap}.tb-sel strong{color:var(--mint);font-size:13px;font-weight:600}
.btn-sum{background:var(--mint);color:var(--navy2);border:none;padding:7px 14px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.02em;font-family:'DM Sans',sans-serif;white-space:nowrap;touch-action:manipulation}
.btn-sum:hover{background:#01b088}
@media(max-width:520px){.tb-sel{display:none}.tb-name{font-size:12px}}

/* PROGRESS */
#prog{background:var(--navy);flex-shrink:0;padding:5px 20px 7px;border-bottom:1px solid rgba(255,255,255,0.07)}
.prog-row{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-lbl{font-size:10px;color:var(--mid)}.prog-lbl strong{color:#fff;font-weight:500}
.prog-track{height:3px;background:rgba(255,255,255,0.1);border-radius:2px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--mint));border-radius:2px;transition:width .35s ease}

/* TABS */
#tabs{background:var(--navy);flex-shrink:0;overflow-x:auto;white-space:nowrap;padding:0 12px;border-bottom:1px solid rgba(255,255,255,0.08);scrollbar-width:none;-webkit-overflow-scrolling:touch}
#tabs::-webkit-scrollbar{display:none}
.tab{display:inline-block;padding:8px 13px;font-size:10.5px;font-weight:500;color:rgba(255,255,255,0.38);cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;touch-action:manipulation}
.tab:hover{color:rgba(255,255,255,0.7)}
.tab.active{color:#fff;border-bottom-color:var(--mint)}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px 20px 24px;-webkit-overflow-scrolling:touch}
#content::-webkit-scrollbar{width:4px}
#content::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.13);border-radius:3px}
.page{display:none}
.page.active{display:block;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){#content{padding:14px 14px 20px}}

/* BOTTOM NAV */
#bnav{background:var(--navy2);flex-shrink:0;border-top:1px solid rgba(255,255,255,0.1);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.nbtn{background:transparent;border:1.5px solid rgba(255,255,255,0.22);color:rgba(255,255,255,0.7);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;touch-action:manipulation;min-width:100px;text-align:center;letter-spacing:.01em}
.nbtn:hover:not(:disabled){background:rgba(255,255,255,0.09);color:#fff;border-color:rgba(255,255,255,0.4)}
.nbtn:active:not(:disabled){transform:scale(0.97)}
.nbtn:disabled{opacity:.2;cursor:not-allowed}
.nbtn.pri{background:linear-gradient(135deg,var(--teal),#015f6b);border-color:var(--teal);color:#fff;box-shadow:0 3px 12px rgba(2,128,144,0.35)}
.nbtn.pri:hover{background:linear-gradient(135deg,var(--mint),var(--teal));border-color:var(--mint);color:var(--navy2);box-shadow:0 4px 16px rgba(2,195,154,0.4)}
#nmid{font-size:11px;color:rgba(255,255,255,0.28);text-align:center;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 6px}
@media(max-width:400px){.nbtn{padding:9px 14px;font-size:12px;min-width:80px}}

/* ── COVER ── */
.cover{background:linear-gradient(135deg,var(--navy) 55%,#0d3060 100%);border-radius:14px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 6px 32px rgba(0,0,0,0.22)}
.c-bar{position:absolute;left:0;top:0;width:5px;height:100%;background:linear-gradient(180deg,var(--mint),var(--teal))}
.c-side{position:absolute;right:0;top:0;width:25%;height:100%;background:rgba(4,18,43,0.5)}
.c-body{padding:44px 52px;position:relative;z-index:1}
.c-badge{display:inline-block;background:var(--teal);color:#fff;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 13px;border-radius:4px;margin-bottom:22px}
.c-title{font-family:'DM Serif Display',serif;font-size:42px;line-height:1.1;color:#fff;margin-bottom:11px}
.c-title em{color:var(--mint);font-style:normal}
.c-sub{font-size:13px;color:var(--mid);max-width:420px;line-height:1.75;margin-bottom:30px}
.c-stats{display:flex;gap:30px}
.cs strong{display:block;font-size:28px;font-weight:600;color:var(--mint)}
.cs span{font-size:9px;color:var(--mid);text-transform:uppercase;letter-spacing:.07em}
.c-foot{border-top:1px solid rgba(255,255,255,0.08);padding:14px 52px;font-size:11px;color:var(--muted);position:relative;z-index:1}

/* ── HOW TO USE ── */
.how-h{font-family:'DM Serif Display',serif;font-size:28px;color:var(--navy);margin-bottom:7px}
.how-sub{font-size:13px;color:var(--muted);line-height:1.7;max-width:600px;margin-bottom:22px}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.step{background:#fff;border:1px solid var(--border);border-radius:11px;overflow:hidden;box-shadow:0 2px 7px rgba(0,0,0,0.05)}
.step-n{background:var(--teal);color:#fff;font-size:20px;font-weight:600;text-align:center;padding:13px}
.step-b{padding:13px}
.step-b h3{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:4px}
.step-b p{font-size:11px;color:var(--muted);line-height:1.6}

/* ── ORG FORM ── */
.form-card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 3px 16px rgba(0,0,0,0.07);max-width:680px;margin:0 auto}
.form-head{background:linear-gradient(120deg,var(--navy),#0d3a6e);padding:28px 36px;position:relative;overflow:hidden}
.form-head::before{content:'';position:absolute;left:0;top:0;width:5px;height:100%;background:var(--mint)}
.form-head h2{font-family:'DM Serif Display',serif;font-size:24px;color:#fff;margin-bottom:5px}
.form-head p{font-size:12px;color:var(--mid);line-height:1.6}
.form-body{padding:28px 36px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.frow.single{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:6px}
.fg label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.fg input,.fg select{
  border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;
  font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);
  background:#fff;transition:border-color .15s;outline:none;
}
.fg input:focus,.fg select:focus{border-color:var(--teal)}
.fg input.err,.fg select.err{border-color:var(--red)}
.ferr{font-size:11px;color:var(--red);margin-top:2px;display:none}
.fg input.err ~ .ferr,.fg select.err ~ .ferr{display:block}
.form-footer{padding:20px 36px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.form-footer p{font-size:11px;color:var(--muted);max-width:340px;line-height:1.55}
.btn-save{background:var(--teal);color:#fff;border:none;padding:11px 28px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:7px}
.btn-save:hover{background:var(--mint);color:var(--navy2)}
.saved-badge{display:none;align-items:center;gap:6px;background:#e5faf5;border:1px solid var(--mint);border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;color:var(--teal)}

/* ── CAT HERO ── */
.cat-hero{background:linear-gradient(120deg,var(--navy),#0d3a6e);border-radius:11px;padding:24px 32px;margin-bottom:18px;display:flex;align-items:center;gap:18px;box-shadow:0 3px 16px rgba(0,0,0,0.16);position:relative;overflow:hidden}
.cat-hero::before{content:'';position:absolute;left:0;top:0;width:4px;height:100%;background:var(--mint)}
.cat-emo{font-size:34px;line-height:1}
.cat-inf h2{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;margin-bottom:3px}
.cat-inf p{font-size:12px;color:var(--mid);max-width:480px;line-height:1.55}
.cat-box{margin-left:auto;flex-shrink:0;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:7px 14px;text-align:center}
.cat-box strong{display:block;font-size:19px;font-weight:600;color:var(--mint)}
.cat-box span{font-size:9px;color:var(--mid);text-transform:uppercase;letter-spacing:.07em}

/* ── PRODUCTS GRID ── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:15px}

/* ── PRODUCT CARD ── */
.prod{background:#fff;border:1.5px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .2s,border-color .2s;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.prod:hover{box-shadow:0 5px 18px rgba(0,0,0,0.09)}
.prod.yes{border-color:var(--mint);box-shadow:0 4px 16px rgba(2,195,154,0.18)}
.prod.no{border-color:var(--red-border);box-shadow:0 2px 8px rgba(229,57,53,0.08)}

.ph{padding:13px 15px 10px;display:flex;align-items:flex-start;gap:10px}
.pico{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.pm{flex:1}
.pct{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:2px}
.pn{font-size:14px;font-weight:600;color:var(--navy);line-height:1.2}
.ptag{font-size:10.5px;color:var(--muted);font-style:italic;margin-top:1px}
.pdesc{padding:0 15px 10px;font-size:11.5px;color:var(--text);line-height:1.65;border-bottom:1px solid #eef3f5}
.pcaps{padding:10px 15px;border-bottom:1px solid #eef3f5}
.slbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.caps{display:flex;flex-wrap:wrap;gap:4px}
.cap{font-size:10px;color:var(--teal);background:var(--light);border-radius:20px;padding:2px 9px;font-weight:500}
.pqs{padding:10px 15px;border-bottom:1px solid #eef3f5}
.qlist{list-style:none}
.qlist li{font-size:11px;color:var(--text);padding:3px 0;display:flex;gap:6px;line-height:1.5}
.qlist li::before{content:"?";color:var(--teal);font-weight:700;flex-shrink:0;font-size:10px;margin-top:2px}

/* YES/NO CHECKBOXES */
.pactions{display:flex;border-top:1px solid #eef3f5}
.pchk{flex:1;padding:10px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:background .15s}
.pchk:first-child{border-right:1px solid #eef3f5}
.pchk:hover{background:#f5fbf9}
.pchk.no-btn:hover{background:#fff5f5}
.prod.yes .pchk.yes-btn{background:#e5faf5}
.prod.no .pchk.no-btn{background:var(--red-bg)}
.chkb{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff}
.chkb.yes-chk{border-color:var(--border)}
.chkb.no-chk{border-color:var(--border)}
.prod.yes .chkb.yes-chk{background:var(--mint);border-color:var(--mint)}
.prod.no .chkb.no-chk{background:var(--red);border-color:var(--red)}
.chkb svg{display:none;width:10px;height:10px}
.prod.yes .chkb.yes-chk svg,.prod.no .chkb.no-chk svg{display:block}
.chklbl{font-size:11px;font-weight:600;color:var(--muted);user-select:none;transition:color .15s}
.prod.yes .pchk.yes-btn .chklbl{color:var(--teal)}
.prod.no .pchk.no-btn .chklbl{color:var(--red)}

/* ── SUMMARY ── */
.shero{background:linear-gradient(120deg,var(--navy),#0d3a6e);border-radius:12px;padding:28px 36px;margin-bottom:22px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.16)}
.shero::before{content:'';position:absolute;left:0;top:0;width:5px;height:100%;background:var(--mint)}
.shero-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.shero h2{font-family:'DM Serif Display',serif;font-size:24px;color:#fff;margin-bottom:5px}
.shero p{font-size:12px;color:var(--mid);max-width:440px;line-height:1.65}
.shero-org{font-size:13px;font-weight:600;color:var(--mint);margin-top:8px}
.shero-stats{display:flex;gap:20px;flex-shrink:0}
.sstat{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:9px;padding:12px 18px;text-align:center}
.sstat strong{display:block;font-size:26px;font-weight:600;line-height:1}
.sstat span{font-size:9px;text-transform:uppercase;letter-spacing:.07em}
.sstat.yes-s strong{color:var(--mint)}.sstat.yes-s span{color:var(--mid)}
.sstat.no-s strong{color:#ef9a9a}.sstat.no-s span{color:rgba(255,255,255,0.35)}

.sempty{text-align:center;padding:48px 20px;background:#fff;border-radius:11px;border:1px solid var(--border);color:var(--muted)}
.sempty div{font-size:28px;margin-bottom:9px}.sempty p{font-size:13px;line-height:1.6}

/* Summary sections */
.sum-tabs{display:flex;gap:8px;margin-bottom:20px}
.sum-tab{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);background:#fff;transition:all .15s;font-family:'DM Sans',sans-serif}
.sum-tab.active-yes{background:var(--mint);border-color:var(--mint);color:var(--navy2)}
.sum-tab.active-no{background:var(--red);border-color:var(--red);color:#fff}
.sum-panel{display:none}.sum-panel.active{display:block}

.ssec{margin-bottom:18px}
.sslbl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);padding-bottom:7px;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sum-prod-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.schip{background:#fff;border-radius:10px;padding:12px 14px;display:flex;gap:11px;align-items:flex-start}
.schip.yes-chip{border:1.5px solid var(--mint);box-shadow:0 2px 7px rgba(2,195,154,0.08)}
.schip.no-chip{border:1.5px solid var(--red-border);box-shadow:0 2px 7px rgba(229,57,53,0.06)}
.schipico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.schip-body{flex:1}
.schipn{font-size:12px;font-weight:600;color:var(--navy)}
.schipt{font-size:10.5px;color:var(--muted);margin-top:1px}
.schip-caps{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.schip-cap{font-size:9.5px;padding:2px 7px;border-radius:20px;font-weight:500}
.yes-chip .schip-cap{color:var(--teal);background:var(--light)}
.no-chip .schip-cap{color:var(--red);background:var(--red-bg)}

.sacts{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;align-items:center}
.bdl{background:var(--navy);color:#fff;border:none;padding:10px 22px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif}
.bdl:hover{background:var(--teal)}
.bsend{background:var(--teal);color:#fff;border:none;padding:10px 22px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif}
.bsend:hover{background:var(--mint);color:var(--navy2)}
.bclr{background:transparent;color:var(--muted);border:1px solid var(--border);padding:10px 22px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.bclr:hover{border-color:var(--text);color:var(--text)}
.send-note{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}

/* TOAST — modern centred pill */
#toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.85);
  background:rgba(10,35,66,0.97);color:#fff;
  padding:14px 28px;border-radius:16px;
  font-size:13px;font-weight:500;line-height:1.5;
  box-shadow:0 8px 40px rgba(0,0,0,0.35),0 0 0 1px rgba(2,195,154,0.2);
  z-index:9999;opacity:0;transition:all .25s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;text-align:center;max-width:320px;width:90%;
  border-top:3px solid var(--mint);
}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#toast .t-icon{font-size:22px;display:block;margin-bottom:6px}
#toast .t-msg{display:block}

/* CONFIRM MODAL */
#modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(4,18,43,0.75);
  z-index:9998;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);padding:20px;
}
#modal-overlay.show{display:flex;animation:mfade .2s ease}
@keyframes mfade{from{opacity:0}to{opacity:1}}
#modal-box{
  background:#fff;border-radius:18px;padding:32px 28px;
  max-width:380px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:mpop .25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes mpop{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
#modal-box .m-icon{font-size:40px;margin-bottom:12px;display:block}
#modal-box h3{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:8px}
#modal-box p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:22px}
.m-btns{display:flex;gap:10px;justify-content:center}
.m-btn{padding:11px 26px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;border:none;touch-action:manipulation}
.m-btn.cancel{background:#f0f4f6;color:var(--muted)}.m-btn.cancel:hover{background:#e2eaed}
.m-btn.confirm{background:var(--red);color:#fff;box-shadow:0 3px 12px rgba(229,57,53,0.3)}.m-btn.confirm:hover{background:#c62828}

/* RESPONSIVE — cover, steps, product grid */
@media(max-width:700px){
  .c-body{padding:28px 24px}
  .c-title{font-size:28px}
  .c-stats{gap:18px}
  .c-foot{padding:12px 24px}
  .steps{grid-template-columns:1fr 1fr}
  .pgrid{grid-template-columns:1fr}
  .cat-hero{flex-wrap:wrap;padding:18px 20px}
  .cat-box{margin-left:0}
  .shero-inner{flex-direction:column;gap:14px}
  .shero-stats{width:100%;justify-content:space-between}
  .form-card{border-radius:10px}
  .frow{grid-template-columns:1fr}
  .form-body{padding:20px 20px}
  .form-head{padding:20px 20px}
  .form-footer{padding:16px 20px 20px;flex-direction:column;align-items:stretch}
  .sacts{flex-direction:column}
  .bdl,.bsend,.bclr{width:100%;justify-content:center}
  .sum-prod-row{grid-template-columns:1fr}

function buildPages(){
  pages=[
    {id:'p0',title:'Welcome'},
    {id:'p1',title:'How to Use'},
    {id:'pform',title:'Organisation Details'},
  ];
  CO.forEach(cat=>{
    const pp=P.filter(x=>x.cat===cat);
    if(pp.length) pages.push({id:'pc-'+cat,title:CATS[cat].label,cat,prods:pp});
  });
  pages.push({id:'psum',title:'My Summary',sum:true});
}

// ── PAGE HTML BUILDERS ──
function pageHTML(pg){
  if(pg.id==='p0') return coverHTML();
  if(pg.id==='p1') return howHTML();
  if(pg.id==='pform') return formHTML();
  if(pg.sum) return sumHTML();
  return catHTML(pg.cat,pg.prods);
}

// ── RENDER ──
function render(){
  const c=document.getElementById('content');
  const t=document.getElementById('tabs');
  c.innerHTML=pages.map((pg,i)=>`<div class="page${i===0?' active':''}" id="${pg.id}">${pageHTML(pg)}</div>`).join('');
  t.innerHTML=pages.map((pg,i)=>`<span class="tab${i===0?' active':''}" id="tab${i}" onclick="goTo(${i})">${pg.title}</span>`).join('');
  document.getElementById('pgt').textContent=pages.length;
  updUI();
  // restore saved badge
  if(org.saved){
    const b=document.getElementById('saved-badge');
    if(b) b.style.display='flex';
  }
}

// ── NAVIGATION ──
function goTo(idx){
  if(idx<0||idx>=pages.length) return;
  document.getElementById(pages[cur].id).classList.remove('active');
  document.getElementById('tab'+cur).classList.remove('active');
  cur=idx;
  if(pages[cur].sum) document.getElementById(pages[cur].id).innerHTML=sumHTML();
  if(pages[cur].id==='pform') document.getElementById(pages[cur].id).innerHTML=formHTML(), org.saved&&showSavedBadge();
  document.getElementById(pages[cur].id).classList.add('active');
  document.getElementById('tab'+cur).classList.add('active');
  document.getElementById('tab'+cur).scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  document.getElementById('content').scrollTop=0;
  updUI();
}
function go(d){let n=cur+d;if(n>=pages.length)n=0;goTo(n);}
function goSum(){goTo(pages.length-1);}

function updUI(){
  document.getElementById('bprev').disabled=cur===0;
  document.getElementById('bnext').textContent=cur===pages.length-1?'↩ Back to Start':'Next →';
  document.getElementById('pgc').textContent=cur+1;
  document.getElementById('pgn').textContent=pages[cur].title;
  document.getElementById('pgf').style.width=(cur/(pages.length-1)*100)+'%';
  document.getElementById('nmid').textContent=pages[cur].title;
  document.getElementById('top-yes').textContent=yesSet.size;
  document.getElementById('top-no').textContent=noSet.size;
}

// ── FORM SAVE ──
function saveForm(){
  const n=document.getElementById('f-name');
  const e=document.getElementById('f-email');
  const i=document.getElementById('f-industry');
  const s=document.getElementById('f-size');
  let ok=true;
  [n,e,i,s].forEach(el=>{el.classList.remove('err')});
  if(!n.value.trim()){n.classList.add('err');ok=false;}
  if(!e.value.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)){e.classList.add('err');ok=false;}
  if(!i.value){i.classList.add('err');ok=false;}
  if(!s.value){s.classList.add('err');ok=false;}
  if(!ok){toast('⚠️','Please fill in all required fields');return;}
  org={name:n.value.trim(),email:e.value.trim(),industry:i.value,size:s.value,saved:true};
  localStorage.setItem('z_org',JSON.stringify(org));
  showSavedBadge();
  toast('✓','Institution details saved!');
}

function showSavedBadge(){
  const b=document.getElementById('saved-badge');
  if(b){b.style.display='flex';}
}

// ── YES/NO TOGGLE ──
function tog(id,type){
  if(type==='yes'){
    if(yesSet.has(id)){yesSet.delete(id);}
    else{yesSet.add(id);noSet.delete(id);}
  } else {
    if(noSet.has(id)){noSet.delete(id);}
    else{noSet.add(id);yesSet.delete(id);}
  }
  localStorage.setItem('z_yes',JSON.stringify([...yesSet]));
  localStorage.setItem('z_no',JSON.stringify([...noSet]));
  const card=document.getElementById('card-'+id);
  if(card){
    card.classList.remove('yes','no');
    if(yesSet.has(id)) card.classList.add('yes');
    else if(noSet.has(id)) card.classList.add('no');
  }
  updUI();
}

// ── SUMMARY TABS ──
function switchSum(t){
  document.getElementById('sp-yes').classList.toggle('active',t==='yes');
  document.getElementById('sp-no').classList.toggle('active',t==='no');
  document.getElementById('tab-yes').className='sum-tab'+(t==='yes'?' active-yes':'');
  document.getElementById('tab-no').className='sum-tab'+(t==='no'?' active-no':'');
}

    toast('📧','Email client opened — please send the email');
  }
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 1l11 5.5-11 5.5V8l8-2.5L1 3V1z" fill="white"/></svg> Send to Consultant`;
  btn.disabled=false;
}

// ── CLEAR with modal ──
function clrAll(){
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
}
function confirmClear(){
  closeModal();
  yesSet.clear();noSet.clear();
  localStorage.removeItem('z_yes');localStorage.removeItem('z_no');
  document.querySelectorAll('.prod.yes,.prod.no').forEach(c=>c.classList.remove('yes','no'));
  updUI();
  if(pages[cur].sum) document.getElementById(pages[cur].id).innerHTML=sumHTML();
  toast('🗑️','All selections cleared — start fresh!');
}
// close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── TOAST ──
let _toastTimer;
function toast(icon,msg){
  if(!msg){msg=icon;icon='✓';}
  document.getElementById('t-icon').textContent=icon;
  document.getElementById('t-msg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

// ── INIT ──
buildPages();render();
</script>
</body>
